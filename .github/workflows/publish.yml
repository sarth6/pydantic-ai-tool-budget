name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (usually a tag like v0.1.1)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write  # required for trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || github.event.release.tag_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Verify tag matches package version
        run: |
          publish_ref="${{ inputs.ref || github.event.release.tag_name }}"
          expected_version="${publish_ref#refs/tags/}"
          expected_version="${expected_version#v}"
          actual_version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path
          
          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          print(pyproject["project"]["version"])
          PY
          )"
          if [ "$actual_version" != "$expected_version" ]; then
            echo "Tag version ($expected_version) does not match pyproject.toml version ($actual_version)."
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Reruns should not fail if the exact release artifacts are already on PyPI.
          skip-existing: true
